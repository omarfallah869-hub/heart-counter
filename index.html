<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد الحب والقلب النابض 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kufam:wght@600;800&display=swap" rel="stylesheet">
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Kufam', sans-serif;
        }
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .content-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 320px;
            pointer-events: none; /* لكي لا يحجب الضغط عن الأزرار */
        }
        .counter-box {
            background: rgba(0, 0, 0, 0.65);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 0, 79, 0.3);
            box-shadow: 0 0 20px rgba(255, 0, 79, 0.2);
            pointer-events: auto;
        }
        .counter-title {
            color: #ff004f;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 79, 0.5);
        }
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .time-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(20, 20, 20, 0.8);
            padding: 8px 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .time-num {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 8px #ff004f;
        }
        .time-label {
            font-size: 10px;
            color: #aaa;
            margin-top: 20px;
        }
        .message-text {
            color: #fff;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-line;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 45px;
            position: relative;
        }
        button {
            padding: 8px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Kufam', sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #yesBtn { background-color: #4caf50; color: white; }
        #noBtn { background-color: #f44336; color: white; transition: all 0.1s ease; position: absolute; }
        
        .final-text {
            font-size: 24px;
            color: #ff004f;
            font-weight: 800;
            display: none;
            text-shadow: 0 0 10px #ff004f;
            animation: pulse 1.5s infinite;
            margin-top: 15px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- سينما المعادلات الرياضية للقلب النابض المأخوذة من لقطاتك الكودية -->
    <canvas id="heart"></canvas>

    <div class="content-container">
        <div class="counter-box" id="mainBox">
            <div class="counter-title">مضى على وجودنا معاً:</div>
            <div class="timer-grid">
                <div class="time-segment"><span class="time-num" id="days">00</span><span class="time-label">يوم</span></div>
                <div class="time-segment"><span class="time-num" id="hours">00</span><span class="time-label">ساعة</span></div>
                <div class="time-segment"><span class="time-num" id="minutes">00</span><span class="time-label">دقيقة</span></div>
                <div class="time-segment"><span class="time-num" id="seconds">00</span><span class="time-label">ثانية</span></div>
            </div>

            <div class="message-text" id="question">كل نبضة من هذا القلب تحسب ثواني العمر معك.. ✨

هل ستظلين بقلبي للأبد؟ 🥺</div>

            <div class="buttons" id="btnGroup">
                <button id="yesBtn" onclick="selectYes()">نعم</button>
                <button id="noBtn" ontouchstart="moveButton(event)" onmouseover="moveButton(event)" onclick="moveButton(event)">لا</button>
            </div>

            <div id="loveName" class="final-text">آياتي للأبد 🥹❤️</div>
        </div>
    </div>

    <audio id="loveSong" src="song.mp3" preload="auto"></audio>

    <script>
        // 📅 تاريخ البداية (السنة، الشهر ناقص 1، اليوم)
        const startDate = new Date(2025, 0, 1, 0, 0, 0); 

        function updateCounter() {
            const now = new Date();
            const difference = now - startDate;
            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);
            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        // 🧠 كود الرسم الرياضي للقلب المأخوذ من صور كودك 3931 و 3932 بدقة كاملة:
        var mobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        var koef = mobile ? 0.5 : 1;
        var canvas = document.getElementById('heart');
        var ctx = canvas.getContext('2d');
        var width = canvas.width = koef * window.innerWidth;
        var height = canvas.height = koef * window.innerHeight;
        var rand = Math.random;
        ctx.fillStyle = "rgba(0,0,0,1)";
        ctx.fillRect(0, 0, width, height);

        var heartPosition = function (rad) {
            return [Math.pow(Math.sin(rad), 3), -(15 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad))];
        };
        var scaleAndTranslate = function (pos, sx, sy, dx, dy) {
            return [dx + pos[0] * sx, dy + pos[1] * sy];
        };

        window.addEventListener('resize', function () {
            width = canvas.width = koef * window.innerWidth;
            height = canvas.height = koef * window.innerHeight;
            ctx.fillStyle = "rgba(0,0,0,1)";
            ctx.fillRect(0, 0, width, height);
        });

        var traceCount = mobile ? 20 : 50;
        var pointsOrigin = [];
        var i;
        var dr = mobile ? 0.3 : 0.1;
        for (i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 210, 13, 0, 0));
        for (i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 150, 9, 0, 0));
        for (i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 90, 5, 0, 0));
        var heartPointsCount = pointsOrigin.length;

        var targetPoints = [];
        var pulse = function (kx, ky) {
            for (i = 0; i < pointsOrigin.length; i++) {
                targetPoints[i] = [];
                targetPoints[i][0] = kx * pointsOrigin[i][0] + width / 2;
                targetPoints[i][1] = ky * pointsOrigin[i][1] + height / 2;
            }
        };

        var e = [];
        for (i = 0; i < heartPointsCount; i++) {
            var x = rand() * width;
            var y = rand() * height;
            e[i] = {
                vx: 0, vy: 0, R: 2, speed: rand() * 5 + 5,
                q: ~~(rand() * heartPointsCount), D: 2 * (i % 2) - 1,
                force: 0.2 * rand() + 0.7,
                f: "hsla(0," + ~~(40 * rand() + 60) + "%," + ~~(60 * rand() + 20) + "%,.3)",
                trace: []
            };
            for (var k = 0; k < traceCount; k++) e[i].trace[k] = { x: x, y: y };
        }

        var config = { traceK: 0.4, timeDelta: 0.01 };
        var time = 0;
        var loop = function () {
            var n = -Math.cos(time);
            pulse((1 + n) * .5, (1 + n) * .5);
            time += ((Math.sin(time)) < 0 ? 9 : (n > 0.8 ? .2 : 1)) * config.timeDelta;
            ctx.fillStyle = "rgba(0,0,0,.1)";
            ctx.fillRect(0, 0, width, height);
            for (i = 0; i < e.length; i++) {
                var u = e[i];
                var q = targetPoints[u.q];
                var dx = u.trace[0].x - q[0];
                var dy = u.trace[0].y - q[1];
                var length = Math.sqrt(dx * dx + dy * dy);
                if (10 > length) {
                    if (0.95 < rand()) {
                        u.q = ~~(rand() * heartPointsCount);
                    } else {
                        if (0.99 < rand()) u.D *= -1;
                        u.q += u.D;
                        u.q %= heartPointsCount;
                        if (0 > u.q) u.q += heartPointsCount;
                    }
                }
                u.vx += -dx / length * u.speed;
                u.vy += -dy / length * u.speed;
                u.trace[0].x += u.vx;
                u.trace[0].y += u.vy;
                u.vx *= u.force;
                u.vy *= u.force;
                for (var k = 0; k < u.trace.length - 1; k++) {
                    var T = u.trace[k];
                    var N = u.trace[k + 1];
                    N.x += config.traceK * (T.x - N.x);
                    N.y += config.traceK * (T.y - N.y);
                }
                ctx.fillStyle = u.f;
                for (var k = 0; k < u.trace.length; k++) {
                    ctx.fillRect(u.trace[k].x, u.trace[k].y, u.R, u.R);
                }
            }
            window.requestAnimationFrame(loop, canvas);
        };
        loop();

        function moveButton(e) {
            e.preventDefault();
            const noBtn = document.getElementById('noBtn');
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            document.getElementById('question').innerHTML = "لو تضيق الدنيا چا غيرك منو يداريني؟ \n تضل نبض هالملف وعمر هالسنين وعيوني.";
            document.getElementById('btnGroup').style.display = 'none';
            document.getElementById('loveName').style.display = 'block';
            const audio = document.getElementById('loveSong');
            audio.play().catch(function(error) { console.log("Audio failed"); });
        }
    </script>
</body>
</html>
